name: Build StreamCast TV APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android-tv/**'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace
        working-directory: android-tv

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamCastTV-APK
          path: android-tv/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Build info
        run: |
          echo "✅ APK built successfully!"
          echo "📦 Download from: Actions → This workflow run → Artifacts"
          ls -lh android-tv/app/build/outputs/apk/release/
